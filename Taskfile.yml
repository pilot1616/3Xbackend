version: '3'

dotenv:
  - .env

tasks:
  init:
    desc: 初始化本地开发环境
    cmds:
      - mkdir -p public/images public/uploads
      - sh -c '[ -f .env ] || cp .env.example .env'
      - sh -c '[ -f front/.env ] || cp front/.env.example front/.env'
      - cd front && npm install

  db:up:
    desc: 启动本地 MySQL 容器
    cmds:
      - docker compose up -d mysql

  db:wait:
    desc: 等待本地 MySQL 容器就绪
    cmds:
      - |
        sh -c 'for i in $(seq 1 60); do \
        if docker exec 3xbackend-mysql mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD:-root}" --silent >/dev/null 2>&1; then \
          echo "mysql is ready"; \
          exit 0; \
        fi; \
        sleep 2; \
        done; \
        echo "mysql did not become ready in time"; \
        exit 1'

  db:down:
    desc: 关闭本地 MySQL 容器
    cmds:
      - docker compose stop mysql

  compose:up:
    desc: 启动完整 Docker Compose 环境
    deps: [init]
    cmds:
      - docker compose up -d --build

  compose:down:
    desc: 关闭完整 Docker Compose 环境
    cmds:
      - docker compose down

  backend:
    desc: 直接本地运行后端（go run）
    deps: [init]
    cmds:
      - |
        SERVER_PORT="${SERVER_PORT:-3000}" \
        DATABASE_MYSQL_USER="${DATABASE_MYSQL_USER:-root}" \
        DATABASE_MYSQL_PASSWORD="${DATABASE_MYSQL_PASSWORD:-root}" \
        DATABASE_MYSQL_ADDRESS="${DATABASE_MYSQL_ADDRESS:-127.0.0.1}" \
        DATABASE_MYSQL_PORT="${DATABASE_MYSQL_PORT:-3306}" \
        DATABASE_MYSQL_SCHEMA="${DATABASE_MYSQL_SCHEMA:-3X}" \
        AUTH_SECRET="${AUTH_SECRET:-3Xbackend-dev-secret}" \
        go run ./cmd

  backend:docker:
    desc: 启动 Docker MySQL 后再本地运行后端
    deps: [init, db:up, db:wait]
    cmds:
      - task backend

  frontend:
    desc: 直接本地运行前端开发服务
    deps: [init]
    dir: front
    cmds:
      - npm run dev -- --host 0.0.0.0

  dev:
    desc: 本地联调，直接运行后端和前端（不编译）
    deps: [init]
    cmds:
      - |
        sh -c 'trap "kill 0" EXIT INT TERM; \
        SERVER_PORT="${SERVER_PORT:-3000}" \
        DATABASE_MYSQL_USER="${DATABASE_MYSQL_USER:-root}" \
        DATABASE_MYSQL_PASSWORD="${DATABASE_MYSQL_PASSWORD:-root}" \
        DATABASE_MYSQL_ADDRESS="${DATABASE_MYSQL_ADDRESS:-127.0.0.1}" \
        DATABASE_MYSQL_PORT="${DATABASE_MYSQL_PORT:-3306}" \
        DATABASE_MYSQL_SCHEMA="${DATABASE_MYSQL_SCHEMA:-3X}" \
        AUTH_SECRET="${AUTH_SECRET:-3Xbackend-dev-secret}" \
        go run ./cmd & \
        cd front && npm run dev -- --host 0.0.0.0'

  dev:docker:
    desc: 启动 Docker MySQL 后进行本地前后端联调
    deps: [init, db:up, db:wait]
    cmds:
      - task dev

  build:
    desc: 本地检查 Go 和前端构建
    cmds:
      - go build ./...
      - cd front && npm run build
