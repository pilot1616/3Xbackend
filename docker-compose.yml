services:
  mysql:
    image: mysql:8.4
    container_name: 3xbackend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-3X}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3xbackend-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-3000}
      DATABASE_MYSQL_USER: ${DATABASE_MYSQL_USER:-root}
      DATABASE_MYSQL_PASSWORD: ${DATABASE_MYSQL_PASSWORD:-root}
      DATABASE_MYSQL_ADDRESS: mysql
      DATABASE_MYSQL_PORT: 3306
      DATABASE_MYSQL_SCHEMA: ${DATABASE_MYSQL_SCHEMA:-3X}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - ./public:/app/public

volumes:
  mysql-data:
